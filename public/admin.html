<!--
  SVG LIQUID WARP FILTER
  Add this hidden SVG anywhere in the <body> (before the admin-box works fine).
  It provides a turbulence-based displacement filter that warps the box shape.

  <svg style="display:none">
    <filter id="warp">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="15"/>
    </filter>
  </svg>

  Tweaks:
    - baseFrequency: 0.01 (gentle) → 0.03 (intense ripples)
    - scale: 10 (subtle) → 30 (heavy distortion)
    - numOctaves: 2 (simple) → 5 (detailed noise)
-->

  <div id="loginSection" class="admin-box">
    <div class="capital">P</div>
    <h1>Admin Login</h1>
    <form class="inside-login"id="adminLogin" novalidate>
      <label class="username">Username: <input id="adminUser" value=""></label>
      <label class="password">Password: <input id="adminPass" type="password" value=""></label>
      <button class="btn-bt" type="submit">Login</button>
    </form>
  </div>

        <!--

          a `data-ref` attribute (the request reference) so handlers can identify the row.
          The controls below are purely UI: attach click/change listeners to them and

        -->
        <tr data-ref="MLY-2026-0231">
          <td class="cell-ref">MLY-2026-0231</td>
          <td class="cell-title">Streetlight out along Purok 4</td>
          <td class="cell-category">Infrastructure repair</td>

          <td class="cell-date">Jul 12</td>
          <td class="cell-status">pending</td>
          <td class="cell-actions">
            <!--
              Quick-action buttons: useful for single-click transitions. To connect:
              - Add a delegated click listener on the table body.
              - On click, walk up from event.target to the enclosing <tr> and read `tr.dataset.ref`.
              - Determine new status from the button (e.g., dataset.status or class name).
              - Update local state or call backend (see wiring notes below).
            -->

            <button class="action-btn" data-status="released" aria-label="Mark released">Release</button>
            <button class="action-btn" data-status="progress" aria-label="Mark in progress">In progress</button>
            <button class="action-btn" data-status="urgent" aria-label="Mark urgent">Urgent</button>

            <!--
              Alternative: a compact select + apply button for explicit updates.
              To connect:
              - Read the selected value from the <select> and the row's `data-ref`.
              - Call your update logic with (ref, newStatus).
            -->
            <label style="margin-left:8px">
              Change:
              <select class="status-select" aria-label="Select status">
                <option value="pending">pending</option>
                <option value="progress">in progress</option>
                <option value="released">released</option>
                <option value="urgent">urgent</option>
              </select>
            </label>
            <button class="apply-status" aria-label="Apply selected status">Apply</button>
          </td>
        </tr>

        <!-- Additional sample row to show multiple entries; generate rows dynamically when connected. -->
        <tr data-ref="MLY-2026-0230">
          <td class="cell-ref">MLY-2026-0230</td>
          <td class="cell-title">Barangay clearance for employment</td>
          <td class="cell-category">Document request</td>
          <td class="cell-purok">Purok 2</td>
          <td class="cell-date">Jul 11</td>
          <td class="cell-status">released</td>
          <td class="cell-actions">
            <button class="action-btn" data-status="released">Release</button>
            <button class="action-btn" data-status="progress">In progress</button>
            <select class="status-select">
              <option value="pending">pending</option>
              <option value="progress">in progress</option>
              <option value="released">released</option>
              <option value="urgent">urgent</option>
            </select>
            <button class="apply-status">Apply</button>
          </td>
        </tr>

        <!-- Additional rows should be generated dynamically when you connect a script or API. -->
      </tbody>
    </table>

  <script>

  document.getElementById('adminLogin').addEventListener('submit', async (evt) => {
  evt.preventDefault();
  const user = document.getElementById('adminUser').value;
  const pass = document.getElementById('adminPass').value;

  try {
    const response = await fetch('https://production-baranggay-registry.onrender.com/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });

    if (!response.ok) {
      alert('Invalid credentials');
      return;
    }

    const { token } = await response.json();
    localStorage.setItem('adminToken', token);  // save for later
    showAdminDashboard();
  } catch (err) {
    alert('Login failed. Check server connection.');
  }
});

function showAdminDashboard() {
  loginSection.hidden = true;
  board.hidden = false;
  loadEntriesFromServer();
  renderAdminTable();
}

    // --- Data sync helpers (admin page) ---

    function loadEntriesFromServer() {
     fetch('https://production-baranggay-registry.onrender.com/api/entries')
    .then(response => {
      if (!response.ok) throw new Error('Failed to load server data');
      return response.json();
    })
    .then(data => {
      entries = data;
      renderAdminTable(); // Redraw table with fresh data
    })
    .catch(error => console.error('Error fetching entries:', error));
   }

    // Persist entries to localStorage. Other tabs will receive a `storage` event and update.
    function saveEntriesToStorage(){
      try{
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      }catch(e){
        console.error('Failed to save entries', e);
      }
    }

    // Listen for storage events from other tabs/windows and refresh the admin table.
    window.addEventListener('storage', (e) => {
      if(e.key === STORAGE_KEY){
        try{
          entries = e.newValue ? JSON.parse(e.newValue) : [];
        }catch(_){
          entries = [];
        }
        renderAdminTable();
      }
    });

    // Render the admin table from the `entries` array.
    function renderAdminTable(){
      const activeEntries = entries.filter(e => e.status !== 'removed');

      if (activeEntries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No active records found.</td></tr>';
        return;
      }
  tbody.innerHTML = entries
    .filter(e => e.status !== 'removed')
    .map(e => `
      <tr data-ref="${e.ref}">
        <td class="cell-ref">${e.ref}</td>
        <td class="cell-fullname">${e.fullname}</td>
        <td class="cell-title">${e.title}</td>
        <td class="cell-category">${e.category}</td>
        <td class="cell-purok">${e.purok}</td>
        <td class="cell-date">${e.date}</td>
        <td class="cell-status">${e.status}</td>
        <td class="cell-actions">
          <button class="action-btn" data-status="released">Release</button>
          <button class="action-btn" data-status="progress">In progress</button>
          <button class="action-btn" data-status="urgent">Urgent</button>
        <select class="status-select">
          <option value="pending" ${e.status === 'pending' ? 'selected' : ''}>pending</option>
          <option value="progress" ${e.status === 'progress' ? 'selected' : ''}>in progress</option>
          <option value="released" ${e.status === 'released' ? 'selected' : ''}>released</option>
          <option value="urgent" ${e.status === 'urgent' ? 'selected' : ''}>urgent</option>
        </select>
          <button class="apply-status">Apply</button>
          <button class="delete-btn">Delete</button>
        </td>
      </tr>
    `).join('');
}

      function updateRequestStatusOnServer(ref, newStatus, reason = null) {
        const payload = { status: newStatus };
        if (reason) payload.note = reason;
        const token = localStorage.getItem('adminToken');

        fetch(`https://production-baranggay-registry.onrender.com/api/entries/${ref}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json',
                     'Authorization': `Bearer ${token}`
                  },
          body: JSON.stringify(payload)
        })
        .then(response => {
          if (response.status === 401) {
            localStorage.removeItem('adminToken');
            loginSection.hidden = false;
            board.hidden = true;
            return;
          }
          if (!response.ok) throw new Error('Server update failed');
          return response.json();
        })
        .then((data) => {
          if (data) loadEntriesFromServer();
        })
        .catch(error => console.error('Update error:', error));
      }

    // Remove a request by ref, persist the updated list, and re-render.
    function deleteRequest(ref, reason){
       const entry = entries.find(x => x.ref === ref);
       if(!entry) return false;
       entry.status = 'removed';
       entry.note = reason;
       renderAdminTable();
       return true;
    }

    // Event delegation: handle clicks for quick-action buttons, apply buttons, and delete button.
    tbody.addEventListener('click', (evt) => {
      const btn = evt.target.closest('button');
      if(!btn) return;
      const tr = btn.closest('tr');
      if(!tr) return;
      const ref = tr.dataset.ref;
      if(btn.classList.contains('action-btn')){
        updateRequestStatusOnServer(ref, btn.dataset.status);
      }else if(btn.classList.contains('apply-status')){
        const select = tr.querySelector('.status-select');
        if(select){
          updateRequestStatusOnServer(ref, select.value);
        }
      }else if(btn.classList.contains('delete-btn')){
        const reason = prompt(`Why are you removing request ${ref}? This will be shown to the requester.`);
        if(reason === null) return;
        if(reason.trim() === ''){
          alert('Please enter a reason before removing.');
          return;
        }
        deleteRequest(ref, reason.trim());
        updateRequestStatusOnServer(ref, 'removed', reason.trim());
      }
      }); 
    // On initial load of admin page, check token and show dashboard or login.
    const savedToken = localStorage.getItem('adminToken');
    if (savedToken) {
      showAdminDashboard();
    }

    function logout() {
      localStorage.removeItem('adminToken');
      loginSection.hidden = false;
      board.hidden = true;
      document.getElementById('adminUser').value = '';
      document.getElementById('adminPass').value = '';
    }
